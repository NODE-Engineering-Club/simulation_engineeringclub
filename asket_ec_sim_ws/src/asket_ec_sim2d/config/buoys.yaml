# buoys.yaml — Gate definitions for the Asket EC 2D simulator
#
# Each gate consists of one red buoy (starboard / right side)
# and one green buoy (port / left side). Nautical convention:
#   Red   → starboard (keep to the right when passing)
#   Green → port      (keep to the left  when passing)
#
# The boat must pass BETWEEN the two buoys of each gate.
# Gate center = midpoint between red and green buoys.
#
# Coordinates are GPS (WGS84 decimal degrees).
# Origin: 41.3851°N, 2.1734°E (Barcelona harbour)
#
# Gate layout (top-down view, north up):
#
#   Gate 3:  R --center-- G   (~18m north, ~15m wide)
#   Gate 2:  R --center-- G   (~10m north, ~15m wide)
#   Gate 1:  R --center-- G   (~ 2m north, ~15m wide)
#            ^             ^
#          ~8m west    ~7m east
#
# Entire course: ~25m x 15m — fits easily in RViz2 view.

gates:
  - id: 1
    red:   {lat: 41.38513, lon: 2.17330}   # starboard (right) buoy
    green: {lat: 41.38513, lon: 2.17350}   # port      (left)  buoy

  - id: 2
    red:   {lat: 41.38520, lon: 2.17330}
    green: {lat: 41.38520, lon: 2.17350}

  - id: 3
    red:   {lat: 41.38527, lon: 2.17330}
    green: {lat: 41.38527, lon: 2.17350}
